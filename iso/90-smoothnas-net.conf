# /etc/sysctl.d/90-smoothnas-net.conf
# SmoothNAS network + writeback tuning.
#
# Paired with the smoothkernel NET_TUNING=1 config (BBR + FQ built-in,
# NET_RX_BUSY_POLL enabled). These settings target a multi-client NAS
# workload over 1/10/25 GbE LAN with write-heavy bursts; they are not
# a sensible default for, e.g., a laptop.
#
# Loaded by systemd-sysctl on boot (late-command writes this file).

# --- TCP buffers -----------------------------------------------------
# Let auto-tuning grow big. tcp_rmem/wmem are {min, default, max};
# max must be <= core.rmem_max / wmem_max. 256 MiB ceilings cover
# long-fat-pipe NFS/SMB bursts without hurting short-lived sockets
# (default stays small).
net.core.rmem_max = 268435456
net.core.wmem_max = 268435456
net.ipv4.tcp_rmem = 4096 131072 134217728
net.ipv4.tcp_wmem = 4096 65536  134217728
net.ipv4.tcp_mtu_probing = 1

# --- BBR + FQ pacing -------------------------------------------------
# Built in by the smoothkernel NET_TUNING=1 knob; we set it here so
# runtime matches the compiled default and so upgrades that keep the
# config file pick up the intended behaviour even if they somehow end
# up on a non-tuned kernel.
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# --- Backlog ---------------------------------------------------------
# Higher than stock for 10 GbE+ burst absorption.
net.core.netdev_max_backlog = 250000
net.core.somaxconn = 4096

# --- Tail-latency reduction on sendfile-heavy NFSv4 / SMB ------------
# Keep no more than ~128 KiB un-ACK'd before userspace send() blocks.
# Prevents deep socket write queues that hold CPU during large flushes.
net.ipv4.tcp_notsent_lowat = 131072

# --- Writeback -------------------------------------------------------
# Cap how much dirty data can pile up before the kernel starts flushing
# (5%) and blocks writers (10%). Stock Debian (20% / 10%) lets a NAS
# build up several GiB of dirty pages on a large-RAM box, then stall
# everything at commit. Tighter limits trade throughput variance for
# steady tail latency.
vm.dirty_background_ratio = 5
vm.dirty_ratio = 10

# --- Swap ------------------------------------------------------------
# An appliance with enough RAM should never page out the pagecache.
vm.swappiness = 1

# --- Metadata cache retention ----------------------------------------
# Lower vfs_cache_pressure biases the kernel toward keeping inode and
# dentry caches over page-cache pages. For multi-client stat-heavy
# workloads (recursive ls, rsync --list, SMB dir enumeration) this is
# a large win — default 100 treats both pools equally and hot NAS
# metadata gets evicted by arbitrary page reads.
vm.vfs_cache_pressure = 50

# --- TCP connection hygiene ------------------------------------------
# Don't reset cwnd after a brief idle. Stock Linux does (historical
# 1-second threshold), which makes long-lived SMB/NFS sessions that
# go quiet for a moment slow-start from scratch on the next burst.
net.ipv4.tcp_slow_start_after_idle = 0

# Allow reuse of TIME_WAIT sockets for new outgoing connections. Safe
# on Linux (unlike tcp_tw_recycle, which we never set).
net.ipv4.tcp_tw_reuse = 1

# Bigger SYN backlog for spiky reconnect storms (e.g. a switch reboot
# with 40 clients all retrying).
net.ipv4.tcp_max_syn_backlog = 8192

# Detect dead clients in ~5 min rather than Linux's 2 h default.
# Important for NAS where a stuck client holding locks can stall
# other clients until keepalive cycles them.
net.ipv4.tcp_keepalive_time   = 300
net.ipv4.tcp_keepalive_intvl  = 60
net.ipv4.tcp_keepalive_probes = 5

# --- Scheduler -------------------------------------------------------
# (kernel.sched_migration_cost_ns was removed from CFS in ~6.7; there's
# no equivalent per-sysctl knob at 6.18. Affinity-pinning systemd units
# via CPUAffinity= is the right tool now.)

# --- File descriptors / PIDs -----------------------------------------
# A NAS serves lots of long-lived connections. The Debian defaults
# (~1M file-max, 32K pid_max) start to bite at 10k+ concurrent clients
# with per-connection threads/fds.
fs.file-max    = 2097152
kernel.pid_max = 4194304
