# SmoothNAS preseed - hands off to the custom installer.
# The Debian installer boots normally (handling hardware detection,
# module loading, udev, etc.), loads this preseed, then the
# early_command execs our installer which takes over completely.
# Redirect to /dev/console so output is visible on the VGA/serial display.
d-i preseed/early_command string exec /smoothnas-install < /dev/console > /dev/console 2>&1
